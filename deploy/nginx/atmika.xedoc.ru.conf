server {
    listen 80;
    listen [::]:80;
    server_name atmika.xedoc.ru atmika.online www.atmika.online xn--80aaxii9a.xn--p1ai www.xn--80aaxii9a.xn--p1ai iam-atmika.com www.iam-atmika.com iam-atmika.ru www.iam-atmika.ru;

    root /var/www/atmika;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /public/content.js {
        proxy_pass http://127.0.0.1:5184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /public/content.json {
        proxy_pass http://127.0.0.1:5184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name atmika.xedoc.ru atmika.online www.atmika.online xn--80aaxii9a.xn--p1ai www.xn--80aaxii9a.xn--p1ai iam-atmika.com www.iam-atmika.com iam-atmika.ru www.iam-atmika.ru;

    root /var/www/atmika;
    index index.html;
    charset utf-8;
    client_max_body_size 250m;

    access_log /var/log/nginx/atmika.xedoc.ru.access.log;
    error_log /var/log/nginx/atmika.xedoc.ru.error.log;

    ssl_certificate /etc/letsencrypt/live/atmika.xedoc.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atmika.xedoc.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /api/admin/ {
        proxy_pass http://127.0.0.1:5184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location ^~ /api/academy/ {
        proxy_pass http://127.0.0.1:5184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /api/yookassa/webhook {
        proxy_pass http://127.0.0.1:5184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/chat {
        proxy_pass http://127.0.0.1:5184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /public/content.js {
        proxy_pass http://127.0.0.1:5184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /public/content.json {
        proxy_pass http://127.0.0.1:5184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(?:courses|course|article|payment|account|legal)(?:/|$) {
        proxy_pass http://127.0.0.1:5184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
